<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPE3 Engineering - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #051424;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 50%),
                #051424;
        }
        .bg-login .line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
            animation: lineMove 8s infinite linear;
        }
        @keyframes lineMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(18, 33, 49, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            color: rgba(180, 200, 220, 0.4);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
        }
        .login-card .back-btn:hover { color: #00e5ff; }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            font-size: 48px;
            color: #00e5ff;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.2));
        }
        .login-logo h2 {
            color: #d4e4fa;
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .login-logo p {
            color: rgba(180, 200, 220, 0.5);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(180, 200, 220, 0.6);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper .material-symbols-outlined {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(180, 200, 220, 0.3);
            font-size: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 10px;
            color: #d4e4fa;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05);
            background: rgba(0, 0, 0, 0.4);
        }
        .form-group input::placeholder {
            color: rgba(180, 200, 220, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00e5ff, #00daf3);
            color: #00363d;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login .material-symbols-outlined { font-size: 22px; }
        .btn-login.loading { opacity: 0.7; pointer-events: none; }
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 54, 61, 0.2);
            border-top-color: #00363d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(147, 0, 10, 0.2);
            border: 1px solid rgba(255, 180, 171, 0.2);
            color: #ffb4ab;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            animation: shake 0.4s ease;
        }
        .error-message.show { display: flex; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .error-message .material-symbols-outlined { font-size: 20px; }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(180, 200, 220, 0.2);
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff;
        }
        .toast.error {
            background: rgba(255, 180, 171, 0.1);
            border: 1px solid rgba(255, 180, 171, 0.3);
            color: #ffb4ab;
        }
        @media (max-width: 480px) {
            .login-card { padding: 32px 20px; margin: 16px; border-radius: 16px; }
            .login-logo .icon { font-size: 36px; }
            .login-logo h2 { font-size: 1.2rem; }
            .form-group input { padding: 12px 14px 12px 40px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="bg-login">
        <div class="line" style="top: 20%;"></div>
        <div class="line" style="top: 50%; animation-delay: 2s;"></div>
        <div class="line" style="top: 80%; animation-delay: 4s;"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="login-card" id="loginCard">
        <a href="index.html" class="back-btn">
            <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
            VOLVER
        </a>

        <div class="login-logo">
            <span class="material-symbols-outlined icon">precision_manufacturing</span>
            <h2>IPE3 Engineering</h2>
            <p>Ingresa tu clave de acceso</p>
        </div>

        <div class="error-message" id="errorMessage">
            <span class="material-symbols-outlined">error</span>
            <span id="errorText">Credencial incorrecta</span>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="accessKey">🔑 Clave de Acceso</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">key</span>
                    <input type="password" id="accessKey" placeholder="Ingresa tu clave" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">
                    <span class="material-symbols-outlined">login</span>
                    INGRESAR
                </span>
            </button>
        </form>

        <div class="login-footer">
            ⚙️ SISTEMA SEGURO · v3.0.0
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN - CONEXIÓN A GOOGLE APPS SCRIPT
        // ============================================
        const CONFIG = {
            // 🔴 Tu URL de Web App
            URL_API: 'https://script.google.com/macros/s/AKfycbxORCqvSBlO5RuKHBSk9a5V0vcJ_pY5MDB-QBZ93X1psNZC4CyzRUI17Rh9rIYLQ8EV/exec',
            // Usuarios locales (fallback)
            USERS: [
                { ruc: '20123456789', name: 'Juan Pérez', role: 'Ingeniero' },
                { ruc: '20987654321', name: 'María García', role: 'Supervisor' },
                { ruc: '20555555555', name: 'Carlos López', role: 'Técnico' },
                { ruc: '20666666666', name: 'Ana Martínez', role: 'Ingeniero' },
                { ruc: '20777777777', name: 'Admin Usuario', role: 'Administrador' }
            ],
            // Mapeo de claves a roles (clave → {nombre, rol})
            CLAVES: {
                'IPE3@2026': { nombre: 'Administrador', rol: 'ADMIN', email: 'admin@ipe3.com', modo: 'admin' },
                '20123456789': { nombre: 'Juan Pérez', rol: 'INGENIERO', email: 'juan.perez@ipe3.com', modo: 'user' },
                '20987654321': { nombre: 'María García', rol: 'SUPERVISOR', email: 'maria.garcia@ipe3.com', modo: 'user' },
                '20555555555': { nombre: 'Carlos López', rol: 'TÉCNICO', email: 'carlos.lopez@ipe3.com', modo: 'user' },
                '20666666666': { nombre: 'Ana Martínez', rol: 'INGENIERO', email: 'ana.martinez@ipe3.com', modo: 'user' },
                '20777777777': { nombre: 'Admin Usuario', rol: 'ADMINISTRADOR', email: 'admin.user@ipe3.com', modo: 'user' }
            }
        };

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const accessKey = document.getElementById('accessKey');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const toast = document.getElementById('toast');

        // ============================================
        // FUNCIONES UI
        // ============================================
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            clearTimeout(window.errorTimeout);
            window.errorTimeout = setTimeout(hideError, 5000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================
        // FUNCIÓN: LLAMAR A LA API
        // ============================================
        async function verificarLoginAPI(credencial) {
            try {
                // Primero probamos con el endpoint de login
                const url = new URL(CONFIG.URL_API);
                url.searchParams.append('endpoint', 'login');
                url.searchParams.append('credencial', credencial);
                url.searchParams.append('tipo', 'admin'); // Usamos admin para validar clave

                const response = await fetch(url.toString());
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                return data;

            } catch (error) {
                console.warn('⚠️ API no disponible, usando datos locales:', error);
                return null;
            }
        }

        // ============================================
        // FUNCIÓN: VERIFICAR LOGIN (LOCAL + API)
        // ============================================
        async function verificarLogin(credencial) {
            // 1. Intentar con la API
            try {
                const resultadoAPI = await verificarLoginAPI(credencial);
                if (resultadoAPI && resultadoAPI.exito && resultadoAPI.usuario) {
                    return {
                        exito: true,
                        usuario: resultadoAPI.usuario
                    };
                }
            } catch (error) {
                console.warn('⚠️ Error en API:', error);
            }

            // 2. Fallback: Validar localmente
            const usuarioLocal = CONFIG.CLAVES[credencial];
            if (usuarioLocal) {
                return {
                    exito: true,
                    usuario: usuarioLocal
                };
            }

            // 3. Verificar si es un RUC de usuario (fallback adicional)
            const userByRUC = CONFIG.USERS.find(u => u.ruc === credencial);
            if (userByRUC) {
                return {
                    exito: true,
                    usuario: {
                        nombre: userByRUC.name,
                        rol: userByRUC.role,
                        email: `${userByRUC.ruc}@ipe3.com`,
                        modo: 'user'
                    }
                };
            }

            return { exito: false, error: 'Clave incorrecta' };
        }

        // ============================================
        // EVENTO: ENVÍO DEL FORMULARIO
        // ============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const credencial = accessKey.value.trim();

            if (!credencial) {
                showError('⚠️ Ingresa tu clave de acceso');
                accessKey.focus();
                return;
            }

            // Mostrar loading
            loginBtn.classList.add('loading');

            try {
                const resultado = await verificarLogin(credencial);

                if (resultado.exito) {
                    // Guardar usuario en localStorage
                    localStorage.setItem('ipe3_user', JSON.stringify(resultado.usuario));
                    
                    const nombre = resultado.usuario.nombre || 'Usuario';
                    showToast(`✅ Bienvenido ${nombre}`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showError(`❌ ${resultado.error || 'Clave incorrecta'}`);
                    loginBtn.classList.remove('loading');
                    accessKey.style.animation = 'shake 0.4s ease';
                    setTimeout(() => accessKey.style.animation = '', 500);
                    accessKey.value = '';
                    accessKey.focus();
                }
            } catch (error) {
                showError('❌ Error al conectar con el servidor');
                loginBtn.classList.remove('loading');
            }

            // Timeout de seguridad
            setTimeout(() => {
                if (loginBtn.classList.contains('loading')) {
                    loginBtn.classList.remove('loading');
                }
            }, 5000);
        });

        // ============================================
        // ENTER KEY
        // ============================================
        accessKey.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // ============================================
        // EFECTO DE PARALLAX EN CARD
        // ============================================
        const card = document.querySelector('.login-card');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 4;
            const y = (e.clientY / window.innerHeight - 0.5) * 4;
            card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
        });

        // ============================================
        // LOG Y ACCESO RÁPIDO
        // ============================================
        console.log('🔐 IPE3 Engineering - Login Unificado');
        console.log('🌐 API URL:', CONFIG.URL_API);
        console.log('📋 Claves registradas:', Object.keys(CONFIG.CLAVES));

        // Acceso rápido desde consola
        window.__IPE3 = {
            config: CONFIG,
            login: async (clave) => {
                accessKey.value = clave;
                loginForm.dispatchEvent(new Event('submit'));
            },
            testAPI: async () => {
                const result = await verificarLoginAPI('IPE3@2026');
                console.log('🧪 Test API:', result);
                return result;
            }
        };
        
        console.log('💡 Acceso rápido: __IPE3.login("IPE3@2026")');
        console.log('💡 Acceso rápido: __IPE3.login("20123456789")');
        console.log('🧪 Probar API: __IPE3.testAPI()');
    </script>

</body>
</html>
