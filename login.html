<script>
        // ============================================
        // CONFIGURACIÓN - CONEXIÓN A GOOGLE APPS SCRIPT
        // ============================================
        const CONFIG = {
            // 🔴 ¡IMPORTANTE! Tu URL de Web App
            URL_API: 'https://script.google.com/macros/s/AKfycbxORCqvSBlO5RuKHBSk9a5V0vcJ_pY5MDB-QBZ93X1psNZC4CyzRUI17Rh9rIYLQ8EV/exec',
            USERS: [
                { ruc: '20123456789', name: 'Juan Pérez', role: 'Ingeniero' },
                { ruc: '20987654321', name: 'María García', role: 'Supervisor' },
                { ruc: '20555555555', name: 'Carlos López', role: 'Técnico' },
                { ruc: '20666666666', name: 'Ana Martínez', role: 'Ingeniero' },
                { ruc: '20777777777', name: 'Admin Usuario', role: 'Administrador' }
            ]
        };

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const tabs = document.querySelectorAll('.tab');
        const modeInput = document.getElementById('modeInput');
        const modeText = document.getElementById('modeText');
        const adminField = document.getElementById('adminField');
        const userField = document.getElementById('userField');
        const adminKey = document.getElementById('adminKey');
        const userRUC = document.getElementById('userRUC');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const toast = document.getElementById('toast');

        // ============================================
        // DETECTAR MODO DESDE URL
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const initialMode = urlParams.get('mode') || 'admin';
        setMode(initialMode);

        // ============================================
        // FUNCIÓN: CAMBIAR MODO
        // ============================================
        function setMode(mode) {
            tabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });

            if (mode === 'admin') {
                adminField.style.display = 'block';
                userField.style.display = 'none';
                modeText.textContent = 'Acceso Administrador';
                modeInput.value = 'admin';
                adminKey.required = true;
                userRUC.required = false;
                hideError();
            } else {
                adminField.style.display = 'none';
                userField.style.display = 'block';
                modeText.textContent = 'Acceso Usuario por RUC';
                modeInput.value = 'user';
                adminKey.required = false;
                userRUC.required = true;
                hideError();
            }
        }

        // ============================================
        // FUNCIÓN: MOSTRAR ERROR
        // ============================================
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            clearTimeout(window.errorTimeout);
            window.errorTimeout = setTimeout(hideError, 5000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        // ============================================
        // FUNCIÓN: MOSTRAR TOAST
        // ============================================
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        // ============================================
        // FUNCIÓN: LLAMAR A LA API DE GOOGLE APPS SCRIPT
        // ============================================
        async function verificarLoginAPI(credencial, tipo) {
            try {
                const url = new URL(CONFIG.URL_API);
                url.searchParams.append('endpoint', 'login');
                url.searchParams.append('credencial', credencial);
                url.searchParams.append('tipo', tipo);

                const response = await fetch(url.toString());
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                return data;

            } catch (error) {
                console.error('❌ Error conectando con API:', error);
                return { 
                    exito: false, 
                    error: 'Error de conexión con el servidor'
                };
            }
        }

        // ============================================
        // FUNCIÓN: VERIFICAR LOGIN (LOCAL + API)
        // ============================================
        async function verificarLogin(credencial, tipo) {
            // 1. Primero intentar con la API de Google Sheets
            try {
                const resultadoAPI = await verificarLoginAPI(credencial, tipo);
                
                if (resultadoAPI.exito && resultadoAPI.usuario) {
                    // Login exitoso vía API
                    return {
                        exito: true,
                        usuario: resultadoAPI.usuario
                    };
                }
            } catch (error) {
                console.warn('⚠️ API no disponible, usando datos locales:', error);
            }

            // 2. Fallback: Validar localmente (para desarrollo)
            if (tipo === 'admin') {
                if (credencial === 'IPE3@2026') {
                    return {
                        exito: true,
                        usuario: {
                            nombre: 'Administrador',
                            rol: 'Admin',
                            email: 'admin@ipe3.com',
                            modo: 'admin'
                        }
                    };
                }
            } else {
                const user = CONFIG.USERS.find(u => u.ruc === credencial);
                if (user) {
                    return {
                        exito: true,
                        usuario: {
                            nombre: user.name,
                            rol: user.role,
                            ruc: user.ruc,
                            modo: 'user'
                        }
                    };
                }
            }

            return { exito: false, error: 'Credenciales incorrectas' };
        }

        // ============================================
        // EVENTO: CAMBIO DE TAB
        // ============================================
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const mode = tab.dataset.mode;
                setMode(mode);
                const url = new URL(window.location);
                url.searchParams.set('mode', mode);
                window.history.pushState({}, '', url);
            });
        });

        // ============================================
        // EVENTO: ENVÍO DEL FORMULARIO
        // ============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const mode = modeInput.value;
            const credencial = mode === 'admin' 
                ? adminKey.value.trim() 
                : userRUC.value.trim();

            if (!credencial) {
                showError('⚠️ Ingresa tus credenciales');
                return;
            }

            // Mostrar loading
            loginBtn.classList.add('loading');

            try {
                // Verificar login (API + fallback local)
                const resultado = await verificarLogin(credencial, mode);

                if (resultado.exito) {
                    // Guardar usuario en localStorage
                    localStorage.setItem('ipe3_user', JSON.stringify(resultado.usuario));
                    
                    const nombre = resultado.usuario.nombre || 'Usuario';
                    showToast(`✅ Bienvenido ${nombre}`, 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    showError(`❌ ${resultado.error || 'Credenciales incorrectas'}`);
                    loginBtn.classList.remove('loading');
                    
                    // Animación de shake
                    const input = mode === 'admin' ? adminKey : userRUC;
                    input.style.animation = 'shake 0.4s ease';
                    setTimeout(() => input.style.animation = '', 500);
                }
            } catch (error) {
                showError('❌ Error al conectar con el servidor');
                loginBtn.classList.remove('loading');
            }

            // Timeout de seguridad
            setTimeout(() => {
                if (loginBtn.classList.contains('loading')) {
                    loginBtn.classList.remove('loading');
                }
            }, 5000);
        });

        // ============================================
        // ENTER KEY EN CAMPOS
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement === adminKey || activeElement === userRUC) {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            }
        });

        // ============================================
        // VALIDACIÓN DE RUC EN TIEMPO REAL
        // ============================================
        userRUC.addEventListener('input', () => {
            userRUC.value = userRUC.value.replace(/\D/g, '');
            if (userRUC.value.length > 13) {
                userRUC.value = userRUC.value.slice(0, 13);
            }
        });

        // ============================================
        // EFECTO DE PARALLAX EN CARD
        // ============================================
        const card = document.querySelector('.login-card');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 4;
            const y = (e.clientY / window.innerHeight - 0.5) * 4;
            card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
        });

        // ============================================
        // LOG Y ACCESO RÁPIDO (DESARROLLO)
        // ============================================
        console.log('🔐 IPE3 Engineering - Login Conectado');
        console.log('🌐 API URL:', CONFIG.URL_API);
        console.log('📋 Modos: Admin (clave) | Usuario (RUC)');
        console.log('👤 Usuarios locales:', CONFIG.USERS);

        // Acceso rápido desde consola
        window.__IPE3 = {
            config: CONFIG,
            api: CONFIG.URL_API,
            login: async (mode, credential) => {
                if (mode === 'admin') {
                    adminKey.value = credential;
                } else {
                    userRUC.value = credential;
                }
                loginForm.dispatchEvent(new Event('submit'));
            },
            testAPI: async () => {
                const result = await verificarLoginAPI('IPE3@2026', 'admin');
                console.log('🧪 Test API:', result);
                return result;
            }
        };
        
        console.log('💡 Acceso rápido: __IPE3.login("admin", "IPE3@2026")');
        console.log('💡 Acceso rápido: __IPE3.login("user", "20123456789")');
        console.log('🧪 Probar API: __IPE3.testAPI()');
    </script>
