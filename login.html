<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPE3 Engineering - Acceso</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IPE3">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #051424;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 50%),
                #051424;
        }
        .bg-login .line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
            animation: lineMove 8s infinite linear;
        }
        @keyframes lineMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(18, 33, 49, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.8s ease-out;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            color: rgba(180, 200, 220, 0.4);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
        }
        .login-card .back-btn:hover { color: #00e5ff; }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            font-size: 48px;
            color: #00e5ff;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.2));
        }
        .login-logo h2 {
            color: #d4e4fa;
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .login-logo p {
            color: rgba(180, 200, 220, 0.5);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(180, 200, 220, 0.6);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper .material-symbols-outlined {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(180, 200, 220, 0.3);
            font-size: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 10px;
            color: #d4e4fa;
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05);
            background: rgba(0, 0, 0, 0.4);
        }
        .form-group input::placeholder {
            color: rgba(180, 200, 220, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00e5ff, #00daf3);
            color: #00363d;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
        }
        .btn-login:active { transform: scale(0.98); }
        .btn-login .material-symbols-outlined { font-size: 22px; }
        .btn-login.loading { opacity: 0.7; pointer-events: none; }
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 54, 61, 0.2);
            border-top-color: #00363d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(147, 0, 10, 0.2);
            border: 1px solid rgba(255, 180, 171, 0.2);
            color: #ffb4ab;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            animation: shake 0.4s ease;
        }
        .error-message.show { display: flex; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .error-message .material-symbols-outlined { font-size: 20px; }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(180, 200, 220, 0.2);
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff;
        }
        .toast.error {
            background: rgba(255, 180, 171, 0.1);
            border: 1px solid rgba(255, 180, 171, 0.3);
            color: #ffb4ab;
        }
        @media (max-width: 480px) {
            .login-card { padding: 32px 20px; margin: 16px; border-radius: 16px; }
            .login-logo .icon { font-size: 36px; }
            .login-logo h2 { font-size: 1.2rem; }
            .form-group input { padding: 12px 14px 12px 40px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="bg-login">
        <div class="line" style="top: 20%;"></div>
        <div class="line" style="top: 50%; animation-delay: 2s;"></div>
        <div class="line" style="top: 80%; animation-delay: 4s;"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="login-card" id="loginCard">
        <a href="index.html" class="back-btn">
            <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
            VOLVER
        </a>

        <div class="login-logo">
            <span class="material-symbols-outlined icon">precision_manufacturing</span>
            <h2>IPE3 Engineering</h2>
            <p>Ingresa tu correo electrónico</p>
        </div>

        <div class="error-message" id="errorMessage">
            <span class="material-symbols-outlined">error</span>
            <span id="errorText">Usuario no encontrado</span>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="userEmail">📧 Correo Electrónico</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" id="userEmail" placeholder="ejemplo@ipe3.com" required autofocus>
                </div>
                <div style="margin-top: 8px; font-size: 0.7rem; color: rgba(180,200,220,0.3);">
                    💡 Usa el correo registrado en el sistema
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">
                    <span class="material-symbols-outlined">login</span>
                    INGRESAR
                </span>
            </button>
        </form>

        <div class="login-footer">
            ⚙️ SISTEMA SEGURO · v3.0.0
        </div>
    </div>

    <script>
        const CONFIG = {
            URL_API: 'https://script.google.com/macros/s/AKfycbxORCqvSBlO5RuKHBSk9a5V0vcJ_pY5MDB-QBZ93X1psNZC4CyzRUI17Rh9rIYLQ8EV/exec'
        };

        const userEmail = document.getElementById('userEmail');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const toast = document.getElementById('toast');

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            clearTimeout(window.errorTimeout);
            window.errorTimeout = setTimeout(hideError, 5000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        async function obtenerUsuarios() {
            try {
                const url = new URL(CONFIG.URL_API);
                url.searchParams.append('endpoint', 'usuarios');
                url.searchParams.append('estado', 'ACTIVO');
                const response = await fetch(url.toString());
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            } catch (error) {
                console.warn('⚠️ Error obteniendo usuarios:', error);
                return null;
            }
        }

        async function verificarLogin(email) {
            email = email.trim().toLowerCase();
            try {
                const usuarios = await obtenerUsuarios();
                if (usuarios && Array.isArray(usuarios)) {
                    const usuario = usuarios.find(u => u.email && u.email.toLowerCase() === email);
                    if (usuario) {
                        return {
                            exito: true,
                            usuario: {
                                id: usuario.id || '',
                                nombre: usuario.nombre || usuario.Nombre_Completo || 'Usuario',
                                rol: usuario.rol || 'USER',
                                email: usuario.email,
                                departamento: usuario.departamento || '',
                                fotoPerfil: usuario.fotoPerfil || '',
                                modo: usuario.rol === 'ADMIN' ? 'admin' : 'user'
                            }
                        };
                    }
                }
            } catch (error) {
                console.warn('⚠️ Error en API:', error);
            }

            const USERS_LOCAL = [
                { Email: 'admin@ipe3.com', Nombre_Completo: 'Administrador Sistema', Rol: 'ADMIN' },
                { Email: 'juan.perez@ipe3.com', Nombre_Completo: 'Juan Pérez', Rol: 'INGENIERO' },
                { Email: 'maria.garcia@ipe3.com', Nombre_Completo: 'María García', Rol: 'SUPERVISOR' },
                { Email: 'carlos.lopez@ipe3.com', Nombre_Completo: 'Carlos López', Rol: 'TÉCNICO' },
                { Email: 'ana.martinez@ipe3.com', Nombre_Completo: 'Ana Martínez', Rol: 'INGENIERO' }
            ];

            const usuarioLocal = USERS_LOCAL.find(u => u.Email.toLowerCase() === email);
            if (usuarioLocal) {
                return {
                    exito: true,
                    usuario: {
                        id: '',
                        nombre: usuarioLocal.Nombre_Completo,
                        rol: usuarioLocal.Rol,
                        email: usuarioLocal.Email,
                        modo: usuarioLocal.Rol === 'ADMIN' ? 'admin' : 'user'
                    }
                };
            }
            return { exito: false, error: 'Correo no registrado en el sistema' };
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const email = userEmail.value.trim();
            if (!email) {
                showError('⚠️ Ingresa tu correo electrónico');
                userEmail.focus();
                return;
            }
            if (!email.includes('@')) {
                showError('⚠️ Ingresa un correo válido');
                userEmail.focus();
                return;
            }
            loginBtn.classList.add('loading');
            try {
                const resultado = await verificarLogin(email);
                if (resultado.exito) {
                    localStorage.setItem('ipe3_user', JSON.stringify(resultado.usuario));
                    showToast(`✅ Bienvenido ${resultado.usuario.nombre}`, 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                } else {
                    showError(`❌ ${resultado.error || 'Usuario no encontrado'}`);
                    loginBtn.classList.remove('loading');
                    userEmail.style.animation = 'shake 0.4s ease';
                    setTimeout(() => userEmail.style.animation = '', 500);
                    userEmail.focus();
                }
            } catch (error) {
                showError('❌ Error al conectar con el servidor');
                loginBtn.classList.remove('loading');
            }
            setTimeout(() => {
                if (loginBtn.classList.contains('loading')) loginBtn.classList.remove('loading');
            }, 5000);
        });

        userEmail.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginForm.dispatchEvent(new Event('submit'));
        });

        const card = document.querySelector('.login-card');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 4;
            const y = (e.clientY / window.innerHeight - 0.5) * 4;
            card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateY(0) rotateX(0)';
        });

        // REGISTRO DEL SERVICE WORKER (RUTA RELATIVA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registrado correctamente'))
                    .catch(err => console.error('❌ SW Error:', err));
            });
        }

        console.log('🔐 IPE3 Engineering - Login');
        window.__IPE3 = {
            config: CONFIG,
            login: async (email) => {
                userEmail.value = email;
                loginForm.dispatchEvent(new Event('submit'));
            },
            testAPI: async () => {
                const users = await obtenerUsuarios();
                console.log('🧪 Usuarios:', users);
                return users;
            }
        };
    </script>

</body>
</html>
