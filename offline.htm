<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPE3 - Sin Conexión</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body {
            background: #051424;
            color: #d4e4fa;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at center, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
        }
        .offline-card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            background: rgba(18, 33, 49, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 24px;
            max-width: 420px;
            width: 90%;
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon { font-size: 72px; color: #ffb4ab; margin-bottom: 16px; }
        .title { font-size: 1.5rem; font-weight: 700; color: #d4e4fa; margin-bottom: 8px; }
        .subtitle { color: rgba(180, 200, 220, 0.5); font-size: 0.9rem; margin-bottom: 24px; }
        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            background: linear-gradient(135deg, #00e5ff, #00daf3);
            color: #00363d;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffb4ab;
            animation: dotPulse 2s infinite;
            margin-right: 8px;
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="offline-card">
        <span class="material-symbols-outlined icon">wifi_off</span>
        <h1 class="title">Sin Conexión</h1>
        <p class="subtitle">
            <span class="status-dot"></span>
            No hay conexión a internet. Algunas funciones pueden no estar disponibles.
        </p>
        <p style="font-size: 0.8rem; color: rgba(180,200,220,0.3); margin-bottom: 24px; font-family: 'JetBrains Mono', monospace;">
            ⚙️ Los datos en caché están disponibles
        </p>
        <button class="btn" onclick="location.reload()">
            <span class="material-symbols-outlined">refresh</span>
            RECARGAR
        </button>
        <div style="margin-top: 16px;">
            <a href="index.html" style="color: rgba(180,200,220,0.3); text-decoration: none; font-size: 0.8rem; transition: color 0.3s;" onmouseover="this.style.color='#00e5ff'" onmouseout="this.style.color='rgba(180,200,220,0.3)'">
                ← Volver al inicio
            </a>
        </div>
    </div>
    <script>
        setInterval(() => { if (navigator.onLine) location.reload(); }, 30000);
        console.log('📴 IPE3 - Modo offline');
    </script>
</body>
</html>
